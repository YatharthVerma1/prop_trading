kind = "web"
previewPath = "/"
title = "PropTrader Elite"
version = "1.0.0"
id = "artifacts/trading-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18540
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/trading-website run dev"

[services.env]
PORT = "18540"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/trading-website", "run", "build"]
publicDir = "artifacts/trading-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
